<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTopUp — Platform Top Up #1</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login-style.css">
<!-- QR Code Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

<!-- ════════════ AUTH PAGE ════════════ -->
<div id="page-auth" class="page active">
  <div class="auth-box">
    <div class="auth-logo">NEX<span>TOP</span>UP</div>
    <div class="auth-sub">Platform Top Up Games & App Premium #1</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Masuk</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Daftar</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="nama@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full mt2" type="button" id="login-btn">⚡ Masuk Sekarang</button>
      <div class="auth-divider mt3">Coba akun demo</div>
      <div class="demo-accounts">
        <button class="demo-btn">
          <strong>👑 ADMIN</strong> — admin@nextopup.id / admin123
        </button>
        <button class="demo-btn">
          <strong>🎮 CUSTOMER</strong> — budi@gmail.com / user123
        </button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="form-register">
      <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-input" id="reg-name" placeholder="Nama kamu"></div>
      <div class="form-group"><label>Email</label><input type="email" class="form-input" id="reg-email" placeholder="nama@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" class="form-input" id="reg-pass" placeholder="Min. 6 karakter"></div>
      <div class="form-group"><label>Konfirmasi Password</label><input type="password" class="form-input" id="reg-pass2" placeholder="Ulangi password"></div>
      <button class="btn btn-primary btn-full mt2" onclick="doRegister()">🚀 Buat Akun Gratis</button>
    </div>
  </div>
</div>

<!-- ════════════ APP SHELL ════════════ -->
<div id="page-app" class="page">
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><div class="logo">NEX<span>TOP</span>UP</div></div>
      <div class="sidebar-user">
        <div class="user-ava" id="sidebarAva">🎮</div>
        <div class="user-info">
          <div class="name" id="sidebarName">User</div>
          <div class="role" id="sidebarRole">Customer</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-bottom">
        <button class="btn btn-danger btn-sm btn-full" onclick="doLogout()">🚪 Keluar</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-right">
          <div class="notif-btn" onclick="toggleNotif()" id="notifBtn">
            🔔<span class="notif-dot" id="notifDot"></span>
          </div>
          <span style="font-size:.82rem;color:var(--muted)" id="topbarUser">-</span>
        </div>
      </div>
      <div class="page-inner" id="mainContent"></div>
    </div>
  </div>
</div>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <h4>🔔 Notifikasi</h4>
    <button class="close-btn" onclick="toggleNotif()">✕</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/login-script.js"></script>
<script>
// Ensure page is fully loaded before any interaction
window.addEventListener('DOMContentLoaded', function() {
  console.log('=== PAGE LOADED ===');
  
  // Only force show auth page if no user is logged in
  if (!currentUser) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-auth').classList.add('active');
    console.log('Auth page activated');
  }
  
  const loginBtn = document.getElementById('login-btn');
  const emailInput = document.getElementById('login-email');
  const passInput = document.getElementById('login-pass');
  
  console.log('Login button found:', loginBtn !== null);
  console.log('Email input found:', emailInput !== null);
  console.log('Password input found:', passInput !== null);
  
  if (loginBtn) {
    // Add click event listener
    loginBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      console.log('=== BUTTON CLICKED ===');
      
      // Prevent multiple clicks
      if (loginBtn.disabled) return;
      loginBtn.disabled = true;
      
      doLogin();
      
      // Re-enable after 1 second
      setTimeout(() => {
        loginBtn.disabled = false;
      }, 1000);
    });
    
    console.log('Event listener attached to button');
  }
  
  // Add Enter key support
  if (emailInput) {
    emailInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (passInput) passInput.focus();
      }
    });
  }
  
  if (passInput) {
    passInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        console.log('=== ENTER KEY PRESSED ===');
        doLogin();
      }
    });
  }
  
  // Also attach to demo buttons
  const demoBtns = document.querySelectorAll('.demo-btn');
  let demoClicked = false;
  
  demoBtns.forEach((btn, index) => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      // Prevent multiple clicks
      if (demoClicked) {
        console.log('Demo button already clicked, ignoring...');
        return;
      }
      demoClicked = true;
      
      console.log('Demo button clicked:', index);
      const email = index === 0 ? 'admin@nextopup.id' : 'budi@gmail.com';
      const pass = index === 0 ? 'admin123' : 'user123';
      if (emailInput) emailInput.value = email;
      if (passInput) passInput.value = pass;
      
      // Small delay to show the values
      setTimeout(() => {
        doLogin();
        // Reset after 2 seconds
        setTimeout(() => {
          demoClicked = false;
        }, 2000);
      }, 100);
    });
  });
  
  console.log('=== SETUP COMPLETE ===');
});
</script>
</body>
</html>
