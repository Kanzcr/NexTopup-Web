<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTopUp — Platform Top Up #1</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--panel:#0a0f1e;--panel2:#0d1424;--panel3:#111827;
  --accent:#00f5ff;--accent2:#ff2d78;--accent3:#7b2fff;
  --gold:#ffd700;--green:#00e676;--orange:#ff9800;
  --text:#e8eaf6;--muted:#8892b0;--border:rgba(255,255,255,.07);
  --glow:0 0 20px rgba(0,245,255,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
input,textarea,select{font-family:'Rajdhani',sans-serif;}
button{font-family:'Rajdhani',sans-serif;cursor:pointer;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* ── UTILITIES ── */
.orb{font-family:'Orbitron';}
.flex{display:flex;}.fac{align-items:center;}.fjb{justify-content:space-between;}
.gap1{gap:.5rem;}.gap2{gap:1rem;}.gap3{gap:1.5rem;}
.mt1{margin-top:.5rem;}.mt2{margin-top:1rem;}.mt3{margin-top:1.5rem;}
.mb2{margin-bottom:1rem;}.mb3{margin-bottom:1.5rem;}
.text-muted{color:var(--muted);}
.text-accent{color:var(--accent);}
.text-gold{color:var(--gold);}
.text-green{color:var(--green);}
.text-red{color:var(--accent2);}
.badge{display:inline-flex;align-items:center;padding:2px 10px;font-size:.72rem;font-weight:700;letter-spacing:.5px;border-radius:2px;}
.badge-green{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25);}
.badge-red{background:rgba(255,45,120,.1);color:var(--accent2);border:1px solid rgba(255,45,120,.2);}
.badge-orange{background:rgba(255,152,0,.1);color:var(--orange);border:1px solid rgba(255,152,0,.2);}
.badge-blue{background:rgba(0,245,255,.08);color:var(--accent);border:1px solid rgba(0,245,255,.2);}
.divider{height:1px;background:var(--border);margin:1.5rem 0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.card{background:var(--panel);border:1px solid var(--border);padding:1.5rem;}
.card-sm{background:var(--panel);border:1px solid var(--border);padding:1rem;}

/* ── FORM ── */
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:.78rem;font-weight:600;letter-spacing:.5px;margin-bottom:.4rem;color:var(--muted);text-transform:uppercase;}
.form-input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px 14px;font-size:.95rem;outline:none;transition:border-color .2s;border-radius:2px;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:rgba(136,146,176,.45);}
.form-select{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px 14px;font-size:.9rem;outline:none;border-radius:2px;appearance:none;}
.form-select:focus{border-color:var(--accent);}

/* ── BUTTONS ── */
.btn{padding:10px 22px;font-weight:700;font-size:.88rem;letter-spacing:1px;text-transform:uppercase;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:transparent;border:1px solid rgba(0,245,255,.35);color:var(--accent);}
.btn-secondary:hover{background:rgba(0,245,255,.07);}
.btn-danger{background:rgba(255,45,120,.15);border:1px solid rgba(255,45,120,.3);color:var(--accent2);}
.btn-danger:hover{background:rgba(255,45,120,.25);}
.btn-sm{padding:6px 14px;font-size:.78rem;}
.btn-full{width:100%;justify-content:center;}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;font-size:.9rem;}

/* ══════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════ */
#page-auth{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
  background:radial-gradient(ellipse 70% 60% at 80% 40%,rgba(123,47,255,.18) 0%,transparent 65%),
             radial-gradient(ellipse 50% 50% at 10% 60%,rgba(0,245,255,.1) 0%,transparent 55%);
  position:relative;
}
#page-auth::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.auth-box{
  width:100%;max-width:440px;position:relative;z-index:1;
  background:var(--panel2);border:1px solid rgba(0,245,255,.15);padding:2.5rem;
}
.auth-logo{font-family:'Orbitron';font-size:1.8rem;font-weight:900;color:var(--accent);text-shadow:var(--glow);letter-spacing:2px;text-align:center;margin-bottom:.3rem;}
.auth-logo span{color:var(--accent2);}
.auth-sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem;}
.auth-tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:.8rem;text-align:center;cursor:pointer;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.auth-form{display:none;}
.auth-form.active{display:block;}
.auth-divider{text-align:center;color:var(--muted);font-size:.78rem;margin:1rem 0;position:relative;}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.auth-divider::before{left:0;}.auth-divider::after{right:0;}
.demo-accounts{display:flex;flex-direction:column;gap:.5rem;}
.demo-btn{background:rgba(0,0,0,.2);border:1px solid var(--border);padding:.7rem 1rem;text-align:left;color:var(--muted);font-size:.82rem;transition:all .2s;}
.demo-btn:hover{border-color:rgba(0,245,255,.3);color:var(--text);}
.demo-btn strong{color:var(--accent);font-family:'Orbitron';font-size:.72rem;}

/* ══════════════════════════════════════
   LAYOUT SHELL (post-login)
══════════════════════════════════════ */
.app-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--panel2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:1.4rem 1.5rem;border-bottom:1px solid var(--border);}
.sidebar-logo .logo{font-family:'Orbitron';font-size:1.2rem;font-weight:900;color:var(--accent);letter-spacing:2px;}
.sidebar-logo .logo span{color:var(--accent2);}
.sidebar-user{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;}
.user-ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.user-info{overflow:hidden;}
.user-info .name{font-family:'Orbitron';font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-info .role{font-size:.7rem;color:var(--muted);}
.sidebar-nav{flex:1;padding:1rem 0;}
.nav-section{padding:.3rem 1.5rem .2rem;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(136,146,176,.5);margin-top:.5rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.5rem;cursor:pointer;color:var(--muted);font-size:.88rem;font-weight:600;transition:all .2s;border-left:3px solid transparent;letter-spacing:.3px;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--accent);background:rgba(0,245,255,.06);border-left-color:var(--accent);}
.nav-item .icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.sidebar-bottom{padding:1rem 1.5rem;border-top:1px solid var(--border);}

/* MAIN */
.main-content{overflow-y:auto;background:var(--bg);}
.topbar{position:sticky;top:0;z-index:50;background:rgba(5,8,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Orbitron';font-size:.95rem;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.notif-btn{position:relative;background:rgba(255,255,255,.05);border:1px solid var(--border);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;}
.notif-btn:hover{border-color:rgba(0,245,255,.3);}
.notif-dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:var(--accent2);border-radius:50%;border:2px solid var(--bg);}
.page-inner{padding:2rem;}

/* ══════════════════════════════════════
   DASHBOARD (Admin)
══════════════════════════════════════ */
.stat-card{background:var(--panel);border:1px solid var(--border);padding:1.4rem;position:relative;overflow:hidden;transition:border-color .3s;}
.stat-card:hover{border-color:rgba(0,245,255,.25);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.c1::before{background:linear-gradient(90deg,var(--accent),transparent);}
.stat-card.c2::before{background:linear-gradient(90deg,var(--accent2),transparent);}
.stat-card.c3::before{background:linear-gradient(90deg,var(--gold),transparent);}
.stat-card.c4::before{background:linear-gradient(90deg,var(--green),transparent);}
.stat-icon{font-size:2rem;margin-bottom:.8rem;}
.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:.3rem;}
.stat-value{font-family:'Orbitron';font-size:1.6rem;font-weight:700;}
.stat-change{font-size:.78rem;margin-top:.3rem;}
.stat-change.up{color:var(--green);}
.stat-change.down{color:var(--accent2);}

/* CHART placeholder */
.chart-area{background:var(--panel);border:1px solid var(--border);padding:1.5rem;}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:.5rem;height:140px;margin-top:1rem;}
.chart-bar{flex:1;background:linear-gradient(to top,var(--accent3),var(--accent));border-radius:2px 2px 0 0;min-height:4px;transition:height .5s ease;position:relative;cursor:pointer;}
.chart-bar:hover::after{content:attr(data-val);position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border);padding:2px 8px;font-size:.7rem;white-space:nowrap;font-family:'Orbitron';}
.chart-label{font-size:.7rem;color:var(--muted);text-align:center;margin-top:.4rem;}

/* ══════════════════════════════════════
   TABLE
══════════════════════════════════════ */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:.75rem 1rem;font-family:'Orbitron';font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
tbody td{padding:.85rem 1rem;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tbody tr:hover{background:rgba(255,255,255,.02);}
.td-name{font-weight:600;}
.td-icon{font-size:1.3rem;}

/* ══════════════════════════════════════
   PRODUCT MANAGEMENT
══════════════════════════════════════ */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;}
.prod-admin-card{background:var(--panel);border:1px solid var(--border);overflow:hidden;transition:border-color .3s;}
.prod-admin-card:hover{border-color:rgba(0,245,255,.25);}
.prod-thumb-sm{height:100px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
.prod-thumb-sm::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--panel) 100%);}
.prod-admin-body{padding:1rem;}
.prod-admin-name{font-family:'Orbitron';font-size:.78rem;font-weight:700;margin-bottom:.2rem;}
.prod-admin-meta{font-size:.75rem;color:var(--muted);margin-bottom:.75rem;}
.prod-admin-actions{display:flex;gap:.4rem;}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--panel2);border:1px solid rgba(0,245,255,.2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:mshow .25s ease;}
.modal-lg{max-width:680px;}
@keyframes mshow{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-family:'Orbitron';font-size:.88rem;font-weight:700;}
.modal-body{padding:1.5rem;}
.modal-footer{padding:0 1.5rem 1.5rem;display:flex;gap:.8rem;justify-content:flex-end;}
.close-btn{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;transition:color .2s;}
.close-btn:hover{color:var(--accent2);}

/* ══════════════════════════════════════
   NOTIFICATIONS PANEL
══════════════════════════════════════ */
.notif-panel{position:fixed;top:60px;right:1.5rem;width:320px;background:var(--panel2);border:1px solid rgba(0,245,255,.2);z-index:400;transform:translateY(-10px) scale(.97);opacity:0;pointer-events:none;transition:all .25s;}
.notif-panel.open{transform:none;opacity:1;pointer-events:all;}
.notif-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.notif-header h4{font-family:'Orbitron';font-size:.78rem;font-weight:700;}
.notif-list{max-height:340px;overflow-y:auto;}
.notif-item{padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:.8rem;align-items:flex-start;transition:background .2s;}
.notif-item:hover{background:rgba(255,255,255,.02);}
.notif-item.unread{border-left:2px solid var(--accent);}
.notif-icon{font-size:1.3rem;flex-shrink:0;margin-top:.1rem;}
.notif-text p{font-size:.83rem;line-height:1.4;}
.notif-time{font-size:.72rem;color:var(--muted);margin-top:.2rem;}

/* ══════════════════════════════════════
   CUSTOMER — STORE
══════════════════════════════════════ */
.store-hero{background:linear-gradient(135deg,rgba(0,245,255,.06),rgba(123,47,255,.1));border-bottom:1px solid var(--border);padding:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.store-search{position:relative;flex:1;max-width:380px;}
.store-search input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text);padding:10px 16px 10px 40px;font-size:.9rem;outline:none;transition:border-color .2s;}
.store-search input:focus{border-color:var(--accent);}
.store-search input::placeholder{color:var(--muted);}
.store-search .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.cat-pills{display:flex;gap:.4rem;flex-wrap:wrap;}
.cat-pill{padding:5px 14px;font-size:.78rem;font-weight:600;letter-spacing:.5px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.cat-pill.active,.cat-pill:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,245,255,.06);}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem;padding:1.5rem;}
.store-card{background:var(--panel);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .3s;}
.store-card:hover{border-color:rgba(0,245,255,.3);transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.4);}
.store-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
.store-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--panel) 100%);}
.store-sbadge{position:absolute;top:8px;left:8px;z-index:1;padding:2px 8px;font-size:.62rem;font-weight:700;letter-spacing:1px;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);text-transform:uppercase;}
.store-body{padding:.9rem;}
.store-name{font-family:'Orbitron';font-size:.78rem;font-weight:700;margin-bottom:2px;}
.store-cat{font-size:.72rem;color:var(--muted);margin-bottom:.7rem;}
.store-price{font-family:'Orbitron';font-size:.95rem;color:var(--gold);font-weight:700;}
.store-from{font-size:.7rem;color:var(--muted);}

/* ══════════════════════════════════════
   PROFILE
══════════════════════════════════════ */
.profile-hero{background:linear-gradient(135deg,rgba(0,245,255,.06),rgba(123,47,255,.1));border-bottom:1px solid var(--border);padding:2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.profile-ava-lg{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:2rem;border:2px solid rgba(0,245,255,.3);flex-shrink:0;}
.profile-info h2{font-family:'Orbitron';font-size:1.1rem;font-weight:700;}
.profile-info p{font-size:.85rem;color:var(--muted);margin-top:.2rem;}
.saldo-card{background:linear-gradient(135deg,rgba(0,245,255,.1),rgba(123,47,255,.15));border:1px solid rgba(0,245,255,.2);padding:1.5rem;position:relative;overflow:hidden;}
.saldo-card::before{content:'';position:absolute;right:-40px;top:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(0,245,255,.1) 0%,transparent 70%);}
.saldo-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:.3rem;}
.saldo-value{font-family:'Orbitron';font-size:2rem;font-weight:900;color:var(--accent);}
.saldo-actions{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap;}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
.toast{background:var(--panel2);border:1px solid rgba(0,245,255,.3);padding:12px 18px;display:flex;gap:10px;align-items:center;min-width:250px;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.5);pointer-events:all;transform:translateX(110%);transition:transform .4s ease;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);}
.toast.show{transform:translateX(0);}
.toast.success{border-color:rgba(0,230,118,.4);}
.toast.error{border-color:rgba(255,45,120,.4);}
.toast-ico{font-size:1.3rem;}
.toast-msg h5{font-family:'Orbitron';font-size:.7rem;font-weight:700;color:var(--accent);}
.toast.success .toast-msg h5{color:var(--green);}
.toast.error .toast-msg h5{color:var(--accent2);}
.toast-msg p{font-size:.75rem;color:var(--muted);}

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state .ei{font-size:3rem;display:block;margin-bottom:.75rem;}
.empty-state h4{font-family:'Orbitron';font-size:.85rem;margin-bottom:.4rem;color:var(--text);}

/* ══════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,.2);border-radius:3px;}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:768px){
  .app-shell{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .grid4{grid-template-columns:1fr 1fr;}
  .grid3{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .page-inner{padding:1rem;}
}

/* ══════════════════════════════════════
   TOPUP DETAIL MODAL
══════════════════════════════════════ */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;margin-top:.4rem;}
.opt-card{border:1px solid var(--border);padding:.8rem;text-align:center;cursor:pointer;transition:all .2s;background:rgba(0,0,0,.2);}
.opt-card:hover,.opt-card.sel{border-color:var(--accent);background:rgba(0,245,255,.07);}

let currentUser = null;
let currentView = '';
let orderCounter = DB.orders.length + 1;
let userCounter = DB.users.length + 1;
let productCounter = DB.products.length + 1;

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  document.querySelector(`.auth-tab:nth-child(${tab==='login'?1:2})`).classList.add('active');
  document.getElementById(`form-${tab}`).classList.add('active');
}

function demoLogin(email, pass){
  document.getElementById('login-email').value = email;
  document.getElementById('login-pass').value = pass;
  doLogin();
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const user = DB.users.find(u=>u.email===email && u.pass===pass);
  if(!user){ showToast('error','Login Gagal','Email atau password salah'); return; }
  currentUser = user;
  initApp();
}

function doRegister(){
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  if(!name||!email||!pass){ showToast('error','Error','Semua field harus diisi'); return; }
  if(pass.length < 6){ showToast('error','Error','Password min. 6 karakter'); return; }
  if(pass !== pass2){ showToast('error','Error','Password tidak cocok'); return; }
  if(DB.users.find(u=>u.email===email)){ showToast('error','Error','Email sudah terdaftar'); return; }
  const newUser = {id:userCounter++, name, email, pass, role:'customer', saldo:25000, joined:new Date().toISOString().slice(0,10), avatar:'🎮'};
  DB.users.push(newUser);
  DB.notifications[newUser.id] = [{id:1, icon:'🎁', text:'Selamat datang! Bonus saldo Rp 25.000 telah ditambahkan.', time:'Baru saja', read:false}];
  showToast('success','Berhasil!','Akun berhasil dibuat. Silakan masuk.');
  document.getElementById('reg-name').value='';
  document.getElementById('reg-email').value='';
  document.getElementById('reg-pass').value='';
  document.getElementById('reg-pass2').value='';
  switchAuthTab('login');
  document.getElementById('login-email').value = email;
}

function doLogout(){
  currentUser = null;
  showPage('page-auth');
  showToast('success','Berhasil','Kamu telah keluar.');
}

function initApp(){
  showPage('page-app');
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarRole').textContent = currentUser.role === 'admin' ? '👑 Administrator' : '🎮 Customer';
  document.getElementById('sidebarAva').textContent = currentUser.avatar;
  document.getElementById('topbarUser').textContent = currentUser.name;
  renderNav();
  renderNotifs();
  if(currentUser.role === 'admin') navigate('dashboard');
  else navigate('store');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderNav(){
  const navData = currentUser.role === 'admin' ? adminNav : customerNav;
  let html = '';
  navData.forEach(sec=>{
    html += `<div class="nav-section">${sec.section}</div>`;
    sec.items.forEach(item=>{
      html += `<div class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')"><span class="icon">${item.icon}</span>${item.label}</div>`;
    });
  });
  document.getElementById('sidebarNav').innerHTML = html;
}

function navigate(view){
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni = document.getElementById('nav-'+view);
  if(ni) ni.classList.add('active');
  const titles = {dashboard:'Dashboard',orders:'Kelola Pesanan',products:'Manajemen Produk',users:'Manajemen Pengguna',store:'Toko Top Up',history:'Riwayat Transaksi',profile:'Profil & Saldo'};
  document.getElementById('topbarTitle').textContent = titles[view] || view;
  const renders = {dashboard:renderDashboard, orders:renderOrders, products:renderProducts, users:renderUsers, store:renderStore, history:renderHistory, profile:renderProfile};
  if(renders[view]) renders[view]();
}

function renderNotifs(){
  const notifs = DB.notifications[currentUser.id] || [];
  const unread = notifs.filter(n=>!n.read).length;
  document.getElementById('notifDot').style.display = unread>0 ? 'block' : 'none';
  let html = notifs.length ? notifs.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}">
      <div class="notif-icon">${n.icon}</div>
      <div class="notif-text"><p>${n.text}</p><div class="notif-time">${n.time}</div></div>
    </div>
  `).join('') : '<div class="empty-state"><span class="ei">🔔</span><p>Tidak ada notifikasi</p></div>';
  document.getElementById('notifList').innerHTML = html;
}

function toggleNotif(){
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    const notifs = DB.notifications[currentUser.id] || [];
    notifs.forEach(n=>n.read=true);
    document.getElementById('notifDot').style.display='none';
    renderNotifs();
  }
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#notifPanel') && !e.target.closest('#notifBtn'))
    document.getElementById('notifPanel').classList.remove('open');
});

        <div class="stat-change up">▲ dari 97.1%</div>
      </div>

            <div class="sl">Revenue</div>

        </div>
        <div class="chart-bar-wrap">${barsHtml}</div>
      </div>
      <div class="card">
        <div class="sl">Top Produk</div>
        <div class="st mb3" style="font-size:1rem">Terlaris <span>Minggu Ini</span></div>
        ${[['🎮','Mobile Legends','48%'],['🔥','Free Fire','22%'],['📺','Netflix','15%'],['🔫','PUBG Mobile','9%']].map(([ic,nm,pct])=>`
          <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.9rem;">

          <option value="failed">Gagal</option>
        </select>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Order ID</th><th>Customer</th><th>Produk</th><th>Game ID</th><th>Amount</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
          <tbody id="ordersTableBody">
            ${renderOrderRows(orders)}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderOrderRows(orders){
  return orders.map(o=>{
    const user = DB.users.find(u=>u.id===o.userId);
    return `<tr>
      <td class="text-accent orb" style="font-size:.72rem">${o.id}</td>
      <td>${user?.name||'Unknown'}</td>
      <td><span style="font-weight:600">${o.product}</span><br><span class="text-muted" style="font-size:.75rem">${o.option}</span></td>
      <td class="text-muted" style="font-size:.82rem">${o.gameId}</td>
      <td class="text-gold orb" style="font-size:.82rem">Rp ${o.amount.toLocaleString('id-ID')}</td>
      <td>${statusBadge(o.status)}</td>
      <td class="text-muted">${o.date}</td>
      <td>
        ${o.status==='pending'?`
          <button class="btn btn-sm" style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);color:var(--green);font-size:.72rem;padding:4px 10px;" onclick="updateOrderStatus('${o.id}','success')">✓ Setujui</button>
          <button class="btn btn-sm btn-danger" style="font-size:.72rem;padding:4px 10px;" onclick="updateOrderStatus('${o.id}','failed')">✗ Tolak</button>
        `:`<span class="text-muted" style="font-size:.75rem">—</span>`}
      </td>
    </tr>`;
  }).join('');
}

function filterOrders(status){
  const orders = status==='all' ? [...DB.orders].reverse() : [...DB.orders].reverse().filter(o=>o.status===status);
  document.getElementById('ordersTableBody').innerHTML = renderOrderRows(orders);
}

function updateOrderStatus(orderId, status){
  const order = DB.orders.find(o=>o.id===orderId);
  if(order){
    order.status = status;
    // Notify customer
    const userNotifs = DB.notifications[order.userId] || [];
    userNotifs.unshift({id:Date.now(), icon: status==='success'?'✅':'❌', text:`Pesanan ${orderId} ${status==='success'?'berhasil diproses':'ditolak'}.`, time:'Baru saja', read:false});
    DB.notifications[order.userId] = userNotifs;
    showToast('success','Updated',`Pesanan ${orderId} → ${status}`);
    renderOrders();
  }
}

function saveNewProduct(){

  const options = optsRaw.map(r=>{ const [label,price] = r.split('|'); return {label:label?.trim(),price:parseInt(price)||0}; }).filter(o=>o.label);
  const colors = ['#120830,#231060','#1a0a05,#3a1205','#0d1835,#1a2860','#051510,#0a2a1a','#05101a,#0a1a30'];
  DB.products.push({id:productCounter++, name, cat, icon, bg:`linear-gradient(135deg,${colors[Math.floor(Math.random()*colors.length)]})`, badge:null, active:true, options});

  document.getElementById('sum-price').textContent = 'Rp '+price.toLocaleString('id-ID');
}

function processTopup(productId){
  const p = DB.products.find(x=>x.id===productId);
  const selCard = document.querySelector('.opt-card.sel');
  if(!selCard){ showToast('error','Error','Pilih nominal terlebih dahulu'); return; }
  const gameId = document.getElementById('topup-gameid').value.trim();
  if(!gameId){ showToast('error','Error','Masukkan ID Game / Email akun'); return; }
  const price = parseInt(selCard.dataset.price);
  const label = selCard.dataset.label;
  if(currentUser.saldo < price){ showToast('error','Saldo Kurang',`Tambah saldo untuk melanjutkan`); return; }
  
  // Deduct saldo
  currentUser.saldo -= price;
  const user = DB.users.find(u=>u.id===currentUser.id);
  if(user) user.saldo = currentUser.saldo;
  
  // Create order
  const orderId = `NTU-${String(orderCounter++).padStart(8,'0')}`;
  const newOrder = {id:orderId, userId:currentUser.id, product:p.name, option:label, amount:price, status:'success', date:new Date().toISOString().slice(0,10), gameId};
  DB.orders.push(newOrder);
  
  // Notification
  const notifs = DB.notifications[currentUser.id] || [];
  notifs.unshift({id:Date.now(), icon:'✅', text:`Top up ${p.name} ${label} berhasil! ID: ${orderId}`, time:'Baru saja', read:false});
  DB.notifications[currentUser.id] = notifs;
  
  // Admin notification
  const adminNotifs = DB.notifications[1] || [];
  adminNotifs.unshift({id:Date.now(), icon:'💰', text:`Pesanan baru ${orderId}: ${p.name} ${label} dari ${currentUser.name}`, time:'Baru saja', read:false});
  DB.notifications[1] = adminNotifs;
  
  closeModal();
  openModal('✅ Transaksi Berhasil!', `
    <div style="text-align:center;padding:1rem 0;">
      <div style="font-size:4rem;margin-bottom:1rem;animation:mshow .4s ease;">${p.icon}</div>
      <div class="text-green orb" style="font-size:1.1rem;font-weight:700;margin-bottom:.4rem;">Top Up Berhasil!</div>
      <p class="text-muted">${p.name} ${label} telah dikirim ke akunmu.</p>
      <div style="background:rgba(0,0,0,.2);border:1px solid var(--border);padding:1rem;margin-top:1.2rem;text-align:left;">
        <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.3rem;"><span class="text-muted">Order ID</span><span class="text-accent orb" style="font-size:.78rem">${orderId}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.3rem;"><span class="text-muted">Produk</span><span>${p.name} ${label}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:.85rem;"><span class="text-muted">Total Dibayar</span><span class="text-gold orb">Rp ${price.toLocaleString('id-ID')}</span></div>
      </div>
      <div style="margin-top:.8rem;font-size:.82rem;color:var(--muted);">Saldo tersisa: <span class="text-gold orb">Rp ${currentUser.saldo.toLocaleString('id-ID')}</span></div>
    </div>
  `, [{label:'Selesai', cls:'btn-primary', action:'closeModal();renderStore()'}]);
  
  // Update sidebar saldo display if visible
  renderNotifs();
  showToast('success','Berhasil!',`${p.name} ${label} berhasil diproses`);
}

// ═══════════════════════════════════════════════
//  CUSTOMER: HISTORY
// ═══════════════════════════════════════════════
function renderHistory(){
  const orders = DB.orders.filter(o=>o.userId===currentUser.id).reverse();
  const totalSpend = orders.filter(o=>o.status==='success').reduce((s,o)=>s+o.amount,0);
  document.getElementById('mainContent').innerHTML = `
    <div class="grid3 mb3">
      <div class="stat-card c1"><div class="stat-icon">📦</div><div class="stat-label">Total Transaksi</div><div class="stat-value orb">${orders.length}</div></div>
      <div class="stat-card c2"><div class="stat-icon">✅</div><div class="stat-label">Sukses</div><div class="stat-value text-green orb">${orders.filter(o=>o.status==='success').length}</div></div>
      <div class="stat-card c3"><div class="stat-icon">💰</div><div class="stat-label">Total Pengeluaran</div><div class="stat-value text-gold orb" style="font-size:1.2rem">Rp ${(totalSpend/1000).toFixed(0)}K</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem;">
        <div><div class="sl">Riwayat</div><div class="st" style="font-size:1rem">Semua <span>Transaksi</span></div></div>
        <select class="form-select" style="width:auto;font-size:.82rem;padding:7px 12px;" onchange="filterHistory(this.value)">
          <option value="all">Semua</option>
          <option value="success">Sukses</option>
          <option value="pending">Pending</option>
          <option value="failed">Gagal</option>
        </select>
      </div>
      <div class="table-wrap" id="historyTable">
        ${renderHistoryRows(orders)}
      </div>
    </div>
  `;
}

function renderHistoryRows(orders){
  if(!orders.length) return '<div class="empty-state"><span class="ei">📋</span><h4>Belum Ada Transaksi</h4><p>Yuk mulai top up dari toko!</p></div>';
  return `<table><thead><tr><th>Order ID</th><th>Produk</th><th>Amount</th><th>Metode Bayar</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>
    ${orders.map(o=>`<tr>
      <td class="text-accent orb" style="font-size:.72rem">${o.id}</td>
      <td><div style="font-weight:600">${o.product}</div><div class="text-muted" style="font-size:.75rem">${o.option} · ${o.gameId}</div></td>
      <td class="text-gold orb" style="font-size:.82rem">Rp ${o.amount.toLocaleString('id-ID')}</td>
      <td class="text-muted" style="font-size:.82rem">Saldo</td>
      <td>${statusBadge(o.status)}</td>
      <td class="text-muted">${o.date}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function filterHistory(status){
  const orders = DB.orders.filter(o=>o.userId===currentUser.id && (status==='all'||o.status===status)).reverse();
  document.getElementById('historyTable').innerHTML = renderHistoryRows(orders);
}

// ═══════════════════════════════════════════════
//  CUSTOMER: PROFILE
// ═══════════════════════════════════════════════
function renderProfile(){
  const orders = DB.orders.filter(o=>o.userId===currentUser.id);
  const totalSpend = orders.filter(o=>o.status==='success').reduce((s,o)=>s+o.amount,0);
  document.getElementById('mainContent').innerHTML = `
    <div class="profile-hero mb3">
      <div class="profile-ava-lg">${currentUser.avatar}</div>
      <div class="profile-info">
        <h2>${currentUser.name}</h2>
        <p>${currentUser.email} · Member sejak ${currentUser.joined}</p>
        <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;">
          <span class="badge badge-blue">🎮 Customer</span>
          <span class="badge badge-green">✅ Terverifikasi</span>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="openEditProfile()">✏️ Edit Profil</button>
    </div>

    <div class="grid2 mb3" style="grid-template-columns:1.4fr 1fr;">
      <div class="saldo-card">
        <div class="saldo-label">Saldo NexTopUp</div>
        <div class="saldo-value">Rp ${currentUser.saldo.toLocaleString('id-ID')}</div>
        <div class="text-muted mt1" style="font-size:.82rem;">Gunakan untuk semua transaksi top up</div>
        <div class="saldo-actions">
          <button class="btn btn-primary btn-sm" onclick="openTopupSaldo()">+ Top Up Saldo</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('history')">📋 Riwayat</button>
        </div>
      </div>
      <div class="card">
        <div class="sl mb2">Statistik Akun</div>
        <div style="display:flex;flex-direction:column;gap:.8rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="text-muted" style="font-size:.85rem;">Total Transaksi</span>
            <span class="orb text-accent" style="font-size:1rem;font-weight:700;">${orders.length}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="text-muted" style="font-size:.85rem;">Transaksi Sukses</span>
            <span class="orb text-green" style="font-size:1rem;font-weight:700;">${orders.filter(o=>o.status==='success').length}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="text-muted" style="font-size:.85rem;">Total Pengeluaran</span>
            <span class="orb text-gold" style="font-size:.9rem;font-weight:700;">Rp ${totalSpend.toLocaleString('id-ID')}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div class="sl">Keamanan Akun</div>
        <button class="btn btn-secondary btn-sm" onclick="openChangePass()">🔑 Ganti Password</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:.6rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;background:rgba(0,0,0,.2);border:1px solid var(--border);">
          <div><div style="font-size:.88rem;font-weight:600;">Email</div><div class="text-muted" style="font-size:.8rem;">${currentUser.email}</div></div>
          <span class="badge badge-green">✓ Terverifikasi</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;background:rgba(0,0,0,.2);border:1px solid var(--border);">
          <div><div style="font-size:.88rem;font-weight:600;">Password</div><div class="text-muted" style="font-size:.8rem;">••••••••</div></div>
          <span class="badge badge-blue">Aktif</span>
        </div>
      </div>
    </div>
  `;
}

function openTopupSaldo(){
  openModal('Top Up Saldo', `
    <div class="text-muted mb3" style="font-size:.88rem;">Pilih nominal saldo yang ingin ditambahkan</div>
    <div class="opt-grid mb3" id="saldoOptGrid">
      ${[25000,50000,100000,200000,500000].map((amt,i)=>`
        <div class="opt-card ${i===0?'sel':''}" onclick="selSaldoOpt(this,${amt})" data-amt="${amt}">
          <div class="oc-amount orb" style="font-size:.9rem">Rp ${(amt/1000).toFixed(0)}K</div>
        </div>
      `).join('')}
    </div>
    <div class="form-group"><label>Metode Pembayaran</label>
      <select class="form-select"><option>💚 GoPay</option><option>🟣 OVO</option><option>🔵 Dana</option><option>⚡ QRIS</option><option>🏦 Transfer Bank</option></select>
    </div>
  `, [
    {label:'Batal', cls:'btn-secondary', action:'closeModal()'},
    {label:'💳 Bayar & Tambah Saldo', cls:'btn-primary', action:'confirmTopupSaldo()'},
  ]);
}

function selSaldoOpt(el, amt){
  document.querySelectorAll('#saldoOptGrid .opt-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function confirmTopupSaldo(){
  const sel = document.querySelector('#saldoOptGrid .opt-card.sel');
  if(!sel) return;
  const amt = parseInt(sel.dataset.amt);
  currentUser.saldo += amt;
  const user = DB.users.find(u=>u.id===currentUser.id);
  if(user) user.saldo = currentUser.saldo;
  const notifs = DB.notifications[currentUser.id]||[];
  notifs.unshift({id:Date.now(), icon:'💰', text:`Saldo berhasil ditambah Rp ${amt.toLocaleString('id-ID')}.`, time:'Baru saja', read:false});
  showToast('success','Berhasil!',`Saldo +Rp ${amt.toLocaleString('id-ID')}`);
  closeModal(); renderProfile();
}

function openEditProfile(){
  openModal('Edit Profil', `
    <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-input" id="ep-name" value="${currentUser.name}"></div>
    <div class="form-group"><label>Avatar (Emoji)</label><input type="text" class="form-input" id="ep-avatar" value="${currentUser.avatar}" maxlength="4"></div>
    <div style="padding:.75rem;background:rgba(255,152,0,.06);border:1px solid rgba(255,152,0,.15);font-size:.82rem;color:var(--orange);">⚠️ Email tidak dapat diubah</div>
  `, [
    {label:'Batal', cls:'btn-secondary', action:'closeModal()'},
    {label:'💾 Simpan', cls:'btn-primary', action:'saveEditProfile()'},
  ]);
}

function saveEditProfile(){
  const name = document.getElementById('ep-name').value.trim();
  const avatar = document.getElementById('ep-avatar').value.trim();
  if(!name){ showToast('error','Error','Nama tidak boleh kosong'); return; }
  currentUser.name = name;
  currentUser.avatar = avatar || currentUser.avatar;
  const user = DB.users.find(u=>u.id===currentUser.id);
  if(user){ user.name=name; user.avatar=currentUser.avatar; }
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarAva').textContent = currentUser.avatar;
  document.getElementById('topbarUser').textContent = name;
  showToast('success','Berhasil','Profil berhasil diperbarui.');
  closeModal(); renderProfile();
}

function openChangePass(){
  openModal('Ganti Password', `
    <div class="form-group"><label>Password Lama</label><input type="password" class="form-input" id="cp-old" placeholder="••••••••"></div>
    <div class="form-group"><label>Password Baru</label><input type="password" class="form-input" id="cp-new" placeholder="Min. 6 karakter"></div>
    <div class="form-group"><label>Konfirmasi Password Baru</label><input type="password" class="form-input" id="cp-new2" placeholder="Ulangi password baru"></div>
  `, [
    {label:'Batal', cls:'btn-secondary', action:'closeModal()'},
    {label:'🔑 Ganti Password', cls:'btn-primary', action:'saveNewPass()'},
  ]);
}

function saveNewPass(){
  const old = document.getElementById('cp-old').value;
  const nw = document.getElementById('cp-new').value;
  const nw2 = document.getElementById('cp-new2').value;
  if(old !== currentUser.pass){ showToast('error','Error','Password lama salah'); return; }
  if(nw.length < 6){ showToast('error','Error','Password min. 6 karakter'); return; }
  if(nw !== nw2){ showToast('error','Error','Konfirmasi password tidak cocok'); return; }
  currentUser.pass = nw;
  const user = DB.users.find(u=>u.id===currentUser.id);
  if(user) user.pass = nw;
  showToast('success','Berhasil','Password berhasil diubah!');
  closeModal();
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function statusBadge(s){
  const map = {success:'<span class="badge badge-green">✓ Sukses</span>',pending:'<span class="badge badge-orange">⏳ Pending</span>',failed:'<span class="badge badge-red">✗ Gagal</span>'};
  return map[s]||s;
}

// ═══════════════════════════════════════════════
//  MODAL ENGINE
// ═══════════════════════════════════════════════
function openModal(title, body, buttons=[]){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalBox').classList.remove('modal-lg');
  document.getElementById('modalFooter').innerHTML = buttons.map(b=>
    `<button class="btn ${b.cls}" onclick="${b.action}">${b.label}</button>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalBox').classList.remove('modal-lg');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastQ = [];
function showToast(type, title, msg){
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const icons = {success:'✅', error:'❌', info:'ℹ️'};
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-ico">${icons[type]||'💬'}</div><div class="toast-msg"><h5>${title}</h5><p>${msg}</p></div>`;
  container.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(), 500); }, 3500);
}
</script>
