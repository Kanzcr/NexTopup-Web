<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Test - Simple</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050810;
  color: #e8eaf6;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}
.login-box {
  background: #0d1424;
  border: 1px solid rgba(0,245,255,.2);
  padding: 2rem;
  width: 100%;
  max-width: 400px;
}
h1 {
  color: #00f5ff;
  margin-bottom: 1.5rem;
  text-align: center;
}
.form-group {
  margin-bottom: 1rem;
}
label {
  display: block;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
  color: #8892b0;
}
input {
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,.3);
  border: 1px solid rgba(255,255,255,.1);
  color: #e8eaf6;
  font-size: 1rem;
}
input:focus {
  outline: none;
  border-color: #00f5ff;
}
.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #00f5ff, #7b2fff);
  color: #000;
  border: none;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 1rem;
  border-radius: 4px;
}
.btn:hover {
  opacity: 0.9;
}
.btn:active {
  transform: scale(0.98);
}
.demo {
  margin-top: 1rem;
  padding: 1rem;
  background: rgba(0,245,255,.05);
  border: 1px solid rgba(0,245,255,.1);
  font-size: 0.85rem;
}
.result {
  margin-top: 1rem;
  padding: 1rem;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  display: none;
}
.result.show {
  display: block;
}
.result.success {
  background: rgba(0,230,118,.1);
  border-color: rgba(0,230,118,.3);
  color: #00e676;
}
.result.error {
  background: rgba(255,45,120,.1);
  border-color: rgba(255,45,120,.3);
  color: #ff2d78;
}
</style>
</head>
<body>

<div class="login-box">
  <h1>🔐 Login Test</h1>
  
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="nama@email.com" value="">
  </div>
  
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" value="">
  </div>
  
  <button class="btn" onclick="testLogin()" type="button">⚡ LOGIN</button>
  
  <div class="demo">
    <strong>Demo Accounts:</strong><br>
    Admin: admin@nextopup.id / admin123<br>
    User: budi@gmail.com / user123
  </div>
  
  <div class="result" id="result"></div>
</div>

<script>
// Database
const DB = {
  users: [
    {id:1, name:'Admin NexTopUp', email:'admin@nextopup.id', pass:'admin123', role:'admin'},
    {id:2, name:'Budi Santoso', email:'budi@gmail.com', pass:'user123', role:'customer'},
  ]
};

function testLogin() {
  console.log('testLogin() called!');
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const resultDiv = document.getElementById('result');
  
  console.log('Email:', email);
  console.log('Password:', password);
  
  if (!email || !password) {
    resultDiv.className = 'result show error';
    resultDiv.innerHTML = '❌ Email dan password harus diisi!';
    return;
  }
  
  const user = DB.users.find(u => u.email === email && u.pass === password);
  console.log('User found:', user);
  
  if (!user) {
    resultDiv.className = 'result show error';
    resultDiv.innerHTML = '❌ Email atau password salah!';
  } else {
    resultDiv.className = 'result show success';
    resultDiv.innerHTML = `✅ Login berhasil!<br>Welcome ${user.name} (${user.role})`;
    
    // Redirect setelah 2 detik
    setTimeout(() => {
      if (user.role === 'admin') {
        alert('Redirect ke dashboard admin...');
      } else {
        alert('Redirect ke store...');
      }
    }, 2000);
  }
}

// Test saat page load
window.addEventListener('load', function() {
  console.log('Page loaded successfully!');
  console.log('Database:', DB);
});
</script>

</body>
</html>
