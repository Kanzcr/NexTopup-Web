<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login-style.css">
</head>
<body>

<div id="page-auth" class="page active">
  <div class="auth-box">
    <div class="auth-logo">NEX<span>TOP</span>UP</div>
    <div class="auth-sub">Platform Top Up Games & App Premium #1</div>
    
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="nama@email.com" value="admin@nextopup.id">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input" id="login-pass" placeholder="••••••••" value="admin123">
      </div>
      <button class="btn btn-primary btn-full mt2" onclick="testLogin()">⚡ Test Login</button>
    </div>
  </div>
</div>

<script>
function testLogin() {
  alert('Button clicked! JavaScript is working.');
  console.log('Email:', document.getElementById('login-email').value);
  console.log('Password:', document.getElementById('login-pass').value);
}
</script>

<script src="login-script.js"></script>
</body>
</html>
